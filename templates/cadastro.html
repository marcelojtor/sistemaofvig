<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Colaborador</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS GLOBAL -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            background-color: #000;
            color: #FFF;
        }

        header {
            background-color: #000;
            padding: 10px 20px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header img {
            height: 40px;
        }

        .container-form {
            max-width: 700px;
            margin: 30px auto;
            background-color: #111;
            padding: 30px;
            border-radius: 10px;
        }

        input, select {
            background-color: #000 !important;
            color: #FFF !important;
            border: 1px solid #444 !important;
        }

        input:focus, select:focus {
            border-color: #0d3b66 !important;
            box-shadow: none !important;
        }

        .btn-primary {
            background-color: #0d3b66;
            border: none;
        }

        .btn-primary:hover {
            background-color: #145ea8;
        }

        .btn-secondary {
            background-color: #333;
            border: none;
        }

        .btn-add {
            background-color: #145ea8;
            border: none;
            margin-top: 10px;
        }

        .btn-add:hover {
            background-color: #1f7ad1;
        }

        .presenca-group {
            margin-bottom: 10px;
        }

        /* 🔥 NOVO - CARD FOTO */
        .foto-card {
            background-color: #000;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .foto-card img {
            max-width: 100%;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="d-flex align-items-center gap-3">
        <img src="{{ url_for('static', filename='Hub_de_Imagens/logo.png') }}">
        <h5>Sistema de Presença</h5>
    </div>

    <div>
        <a href="{{ url_for('menu') }}" class="btn btn-sm btn-secondary">Menu</a>
        <a href="{{ url_for('logout') }}" class="btn btn-sm btn-danger">Sair</a>
    </div>
</header>

<!-- FORM -->
<div class="container-form">

    <h4 class="text-center mb-4">Cadastro de Colaborador</h4>

    <!-- 🔥 FORM PRINCIPAL MANTIDO -->
    <form method="POST">

        <label>Nome</label>
        <input type="text" name="nome" class="form-control" required>

        <label class="mt-2">CPF</label>
        <input type="text" name="cpf" class="form-control" required>

        <label class="mt-2">CN</label>
        <input type="text" name="cn" class="form-control">

        <label class="mt-2">Sexo</label>
        <select name="sexo" class="form-control">
            <option value="">Selecione</option>
            <option>Masculino</option>
            <option>Feminino</option>
        </select>

        <label class="mt-2">Profissão</label>
        <select name="profissao" class="form-control" required>
            <option value="">Selecione</option>
            <option>Vigilante</option>
            <option>Controle de acesso</option>
            <option>Controle de trânsito</option>
            <option>Supervisão</option>
            <option>Assistente de serviços gerais</option>
            <option>Portaria</option>
            <option>Outro</option>
        </select>

        <label class="mt-2">Valor do pagamento</label>
        <input type="number" step="0.01" name="valor" class="form-control" required>

        <label class="mt-2">Pix</label>
        <input type="text" name="pix" class="form-control">

        <label class="mt-2">Banco</label>
        <input type="text" name="banco" class="form-control">

        <!-- PRESENÇAS DINÂMICAS -->
        <hr>
        <h5>Presenças</h5>

        <div id="presencas-container">
            <div class="presenca-group">
                <input type="date" name="datas[]" class="form-control">
            </div>
        </div>

        <button type="button" class="btn btn-add w-100" onclick="adicionarDia()">
            + Adicionar dia
        </button>

        <!-- 🔥 NOVA ÁREA DE FOTO -->
        <hr>
        <h5>Foto do Colaborador</h5>

        <input type="file" id="fotoInput" accept="image/*" class="form-control">

        <!-- PREVIEW -->
        <div id="preview-container" class="mt-3" style="display:none;">
            <div class="foto-card">
                <img id="preview-img" src="">
                
                <!-- FORM DE UPLOAD -->
                <form id="formFoto" method="POST" enctype="multipart/form-data">
                    <input type="file" name="foto" id="hiddenFoto" style="display:none;">
                    <button type="submit" class="btn btn-primary mt-2">
                        Salvar Foto
                    </button>
                </form>
            </div>
        </div>

        <!-- BOTÕES -->
        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary w-50">Salvar</button>
            <a href="{{ url_for('menu') }}" class="btn btn-secondary w-50">Voltar</a>
        </div>

    </form>

</div>

<!-- SCRIPT -->
<script>
    function adicionarDia() {
        const container = document.getElementById('presencas-container');

        const div = document.createElement('div');
        div.classList.add('presenca-group');

        div.innerHTML = `<input type="date" name="datas[]" class="form-control mt-2">`;

        container.appendChild(div);
    }

    // 🔥 PREVIEW + INTEGRAÇÃO
    document.getElementById('fotoInput').addEventListener('change', function(e) {
        const file = e.target.files[0];

        if (file) {
            const reader = new FileReader();

            reader.onload = function(e) {
                document.getElementById('preview-img').src = e.target.result;
                document.getElementById('preview-container').style.display = 'block';

                const dt = new DataTransfer();
                dt.items.add(file);
                document.getElementById('hiddenFoto').files = dt.files;
            }

            reader.readAsDataURL(file);
        }
    });
</script>

</body>
</html>
