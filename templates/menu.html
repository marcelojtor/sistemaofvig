<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Menu Principal</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS GLOBAL -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            background-color: #000;
            color: #FFF;
        }

        header {
            background-color: #000;
            padding: 10px 20px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header img {
            height: 40px;
        }

        .container-main {
            padding: 40px;
            max-width: 800px;
            margin: auto;
        }

        .card-btn {
            background-color: #111;
            border: 1px solid #222;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .card-btn:hover {
            transform: scale(1.03);
            border-color: #0d3b66;
        }

        .btn-primary {
            background-color: #0d3b66;
            border: none;
        }

        .btn-primary:hover {
            background-color: #145ea8;
        }

        .evento-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .evento-info span {
            color: #0d3b66;
            font-weight: bold;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="d-flex align-items-center gap-3">
        <img src="{{ url_for('static', filename='Hub_de_Imagens/logo.png') }}">
        <h5>Sistema de Presença</h5>
    </div>

    <div>
        <span class="me-3">Usuário: {{ user.username }} ({{ user.role }})</span>
        <a href="{{ url_for('logout') }}" class="btn btn-sm btn-danger">Sair</a>
    </div>
</header>

<!-- CONTEÚDO -->
<div class="container-main">

    <!-- EVENTO ATIVO -->
    <div class="evento-info">
        <h4>Evento / Contrato Atual:</h4>
        <span>{{ evento.nome }} ({{ evento.tipo }})</span>
    </div>

    <!-- BOTÕES -->
    <a href="{{ url_for('cadastrar') }}" class="text-decoration-none">
        <div class="card-btn">
            <h5>Cadastrar Colaborador</h5>
        </div>
    </a>

    <a href="{{ url_for('listar_colaboradores') }}" class="text-decoration-none">
        <div class="card-btn">
            <h5>Ver Todos Colaboradores</h5>
        </div>
    </a>

    <!-- EXCLUSÃO CONTROLADA -->
    {% if user.role != 'supervisor' %}
    <a href="{{ url_for('listar_colaboradores') }}" class="text-decoration-none">
        <div class="card-btn">
            <h5>Excluir Colaborador</h5>
        </div>
    </a>
    {% endif %}

    <a href="{{ url_for('relatorios') }}" class="text-decoration-none">
        <div class="card-btn">
            <h5>Relatórios / Dashboard</h5>
        </div>
    </a>

</div>

</body>
</html>
